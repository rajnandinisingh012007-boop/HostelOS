<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HostelOS — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#0d0f14; --surface:#13161d; --text:#eef0f6; --accent:#6c63ff; --red:#ef4444; }
        body { background:var(--bg); color:var(--text); font-family:'DM Sans', sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; }
        .login-card { background:var(--surface); padding:40px; border-radius:20px; width:100%; max-width:400px; border:1px solid rgba(255,255,255,0.05); }
        h1 { font-family:'Syne'; margin-bottom:10px; }
        input, select { width:100%; padding:12px; margin:10px 0; background:#1a1e28; border:1px solid rgba(255,255,255,0.1); color:white; border-radius:8px; }
        button { width:100%; padding:14px; background:var(--accent); border:none; color:white; font-weight:600; border-radius:8px; cursor:pointer; margin-top:10px; }
        .error { color:var(--red); font-size:13px; margin-top:10px; display:none; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>HostelOS</h1>
        <p style="color:#7a7f90; margin-bottom:20px;">Welcome back, please login.</p>
        
        <select id="role">
            <option value="student">Student</option>
            <option value="warden">Warden</option>
            <option value="admin">Admin</option>
        </select>
        <input type="text" id="userId" placeholder="User ID (e.g. STU001)">
        <input type="password" id="userPass" placeholder="Password">
        
        <button onclick="handleLogin()">Sign In</button>
        <div id="errorMsg" class="error">Invalid ID or Password</div>
    </div>

    <script>
        async function handleLogin() {
            const role = document.getElementById('role').value;
            const user_id = document.getElementById('userId').value;
            const password = document.getElementById('userPass').value;
            const error = document.getElementById('errorMsg');

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id, password, role })
                });
                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('hostel_role', role);
                    localStorage.setItem('hostel_user', user_id);
                    window.location.href = `dashboard-${role}.html`;
                } else {
                    error.style.display = 'block';
                }
            } catch (e) {
                alert("Server connection failed. Run app.py first!");
            }
        }
    </script>
</body>
</html>
